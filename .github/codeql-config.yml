# CodeQL analysis configuration.
#
# CycloneDX.E2ETests is excluded from security scanning because it is test
# infrastructure that creates temporary files using only system-controlled
# paths (Path.GetTempPath() + Path.GetRandomFileName()).  CodeQL's C# taint
# model conservatively treats GetTempPath() as tainted (it reads an
# environment variable), which produces false-positive path-injection alerts
# with no real security impact in a test project.
paths-ignore:
  - CycloneDX.E2ETests
